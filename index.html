<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego de amor 💖</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(135deg, #ff4e70, #ff9a9e);
    font-family: Arial;
    color: white;
  }

  .pantalla {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
  }

  h1 {
    font-size: 28px;
  }

  p {
    font-size: 18px;
    margin: 5px 0;
  }

  button {
    margin-top: 20px;
    padding: 15px 30px;
    font-size: 20px;
    border: none;
    border-radius: 12px;
    background: white;
    color: #ff4e70;
    cursor: pointer;
  }

  #player {
    position: absolute;
    bottom: 20px;
    font-size: 35px;
    display: none;
  }

  .enemigo {
    position: absolute;
    font-size: 28px;
  }

  #vidas, #tiempo {
    position: absolute;
    width: 100%;
    text-align: center;
    font-size: 20px;
    display: none;
  }

  #vidas { top: 10px; }
  #tiempo { top: 40px; }

  #fin {
    display: none;
  }
</style>

</head>
<body>

<!-- INICIO -->
<div id="inicio" class="pantalla">
  <h1>💖 Fátima 💖</h1>
  <p>🎮 Cómo jugar:</p>
  <p>👉 Mueve la carita 😁</p>
  <p>👉 Evita los 💔</p>
  <p>👉 Tienes 3 vidas ❤️</p>
  <p>👉 Sobrevive 35 segundos</p>
  <button onclick="iniciar()">Jugar 💕</button>
</div>

<!-- HUD -->
<div id="vidas">Vidas: ❤️❤️❤️</div>
<div id="tiempo">Tiempo: 35</div>

<!-- PLAYER -->
<div id="player">😁</div>

<!-- FINAL -->
<div id="fin" class="pantalla">
  <h2 id="resultado"></h2>
  <button onclick="reiniciar()">Reintentar 🔄</button>
</div>

<script>
let player = document.getElementById("player");
let vidasEl = document.getElementById("vidas");
let tiempoEl = document.getElementById("tiempo");
let inicioPantalla = document.getElementById("inicio");
let finPantalla = document.getElementById("fin");
let resultado = document.getElementById("resultado");

let vidas, tiempo, jugando, velocidad;

function iniciar() {
  inicioPantalla.style.display = "none";

  player.style.display = "block";
  vidasEl.style.display = "block";
  tiempoEl.style.display = "block";

  vidas = 3;
  tiempo = 35;
  velocidad = 3;
  jugando = true;

  actualizarVidas();
  loopTiempo();
}

// mover
document.addEventListener("touchmove", e => {
  if(jugando) player.style.left = e.touches[0].clientX + "px";
});

document.addEventListener("mousemove", e => {
  if(jugando) player.style.left = e.clientX + "px";
});

// vidas
function actualizarVidas() {
  vidasEl.innerText = "Vidas: " + "❤️".repeat(vidas);
}

// enemigos
setInterval(() => {
  if(!jugando) return;

  let enemigo = document.createElement("div");
  enemigo.innerHTML = "💔";
  enemigo.className = "enemigo";

  enemigo.style.left = Math.random()*window.innerWidth + "px";
  enemigo.style.top = "-30px";

  document.body.appendChild(enemigo);

  let vel = velocidad;

  let mover = setInterval(()=>{
    enemigo.style.top = (parseFloat(enemigo.style.top)+vel)+"px";

    let p = player.getBoundingClientRect();
    let e = enemigo.getBoundingClientRect();

    if(
      p.left < e.right &&
      p.right > e.left &&
      p.top < e.bottom &&
      p.bottom > e.top
    ){
      enemigo.remove();
      clearInterval(mover);

      vidas--;
      actualizarVidas();

      if(vidas<=0){
        terminar(false);
      }
    }

    if(parseFloat(enemigo.style.top) > window.innerHeight){
      enemigo.remove();
      clearInterval(mover);
    }

  },20);

},600);

// tiempo + dificultad
function loopTiempo() {
  let intervalo = setInterval(() => {
    if(!jugando){
      clearInterval(intervalo);
      return;
    }

    tiempo--;
    tiempoEl.innerText = "Tiempo: " + tiempo;

    if(tiempo % 5 === 0){
      velocidad += 1;
    }

    if(tiempo <= 0){
      terminar(true);
    }

  },1000);
}

// terminar
function terminar(gano) {
  jugando = false;

  player.style.display = "none";
  vidasEl.style.display = "none";
  tiempoEl.style.display = "none";

  finPantalla.style.display = "flex";

  if(gano){
    resultado.innerText = "💖 Ganaste 😍 Juan ama muchísimo a Fátima ❤️";
  } else {
    resultado.innerText = "💔 Perdiste 😢 pero Juan te ama mucho ❤️";
  }
}

// reiniciar
function reiniciar() {
  location.reload();
}
</script>

</body>
</html>
